<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0"
    />
    <title>AR 植物探索小尖兵</title>
    <!-- 引入 A-Frame 與 AR.js 函式庫 -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body style="margin: 0; overflow: hidden">
    <!-- UI 顯示區：給小朋友看的提示文字與植物介紹 -->
    <div id="ui-container">
      <h1 id="plant-name">請掃描圖卡</h1>
      <p id="plant-desc">找找看植物在哪裡呢？</p>
    </div>

    <!-- AR 場景設定 -->
    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    >
      <!-- 預載 3D 模型資源 -->
      <a-assets>
        <a-asset-item
          id="sunflower-model"
          src="assets/models/Tree1.glb"
        ></a-asset-item>
        <a-asset-item
          id="cactus-model"
          src="assets/models/cactus.glb"
        ></a-asset-item>
      </a-assets>

      <!-- 植物一：向日葵 (使用 barcode 標記或自訂圖卡) -->
      <!-- 這裡設定 marker 觸發時會發送事件給 app.js -->
      <a-marker type="barcode" value="1" id="marker-sunflower">
        <!-- 設定模型大小與位置，並加上簡單的旋轉動畫 -->
        <a-entity
          gltf-model="#sunflower-model"
          scale="0.5 0.5 0.5"
          position="0 0 0"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 5000"
        >
        </a-entity>
      </a-marker>

      <!-- 植物二：仙人掌 -->
      <a-marker type="barcode" value="2" id="marker-cactus">
        <a-entity
          gltf-model="#cactus-model"
          scale="0.5 0.5 0.5"
          position="0 0 0"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 5000"
        >
        </a-entity>
      </a-marker>

      <!-- 攝影機視角 -->
      <a-entity camera></a-entity>
    </a-scene>

    <script src="app.js"></script>
  </body>
</html>
